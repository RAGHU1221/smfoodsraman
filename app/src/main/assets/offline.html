<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f0e17">
<title>Offline — POS Billing Pro</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; background: #0f0e17; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; padding: 20px; }
.wrap { text-align: center; max-width: 360px; }
.icon { font-size: 64px; margin-bottom: 20px; }
h1 { color: #6366f1; font-size: 22px; font-weight: 800; margin: 0 0 8px; }
p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin: 0 0 24px; }
.btn { display: inline-block; background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; border: none; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; }
.badge { display: inline-block; background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 700; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📡</div>
  <div class="badge">⚠️ No Internet</div>
  <h1>You're Offline</h1>
  <p>Internet connection is unavailable. Bills created offline will be synced automatically when you're back online.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
